name: Build Android APK

on:
  push:
    branches: [ "main", "master", "основной" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Unzip project if exists
      run: |
        if [ -f *.zip ]; then
          unzip -o *.zip -d ./
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Ensure Gradle Wrapper exists
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug
